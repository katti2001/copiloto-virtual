video:
  camera_index: 0
  target_fps: 30

thresholds:
  ear_closed: 0.22       # ojo cerrado (menor = mas cerrado)
  ear_frames: 4         # frames consecutivos para detectar ojo cerrado
  mar_yawn: 0.5         # boca abierta (mayor = mas abierta)
  mar_frames: 4          # frames consecutivos para detectar bostezo
  head_pitch_deg: 18    # angulo de cabeza hacia abajo
  pitch_frames: 5        # frames consecutivos para cabeza abajo

alerts:
  quiz_timeout_sec: 12   # segundos para responder
  cooldown_sec: 3        # tiempo entre alertas (segundos)
  tts_voice_enabled: true
  stt_enabled: true

logging:
  debug: true
