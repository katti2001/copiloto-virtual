<!DOCTYPE html>
<html>
<head>
    <title>Bienvenida</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: url("https://images.unsplash.com/photo-1493238792000-8113da705763") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
        }

        .welcome-box {
            position: relative;
            background: rgba(20, 20, 20, 0.95);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 0 30px rgba(255,0,0,0.6);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #ff3c3c;
            margin-bottom: 20px;
        }

        p {
            color: #ccc;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 25px;
            background: #ff3c3c;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background: #cc0000;
            box-shadow: 0 0 15px #ff3c3c;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="welcome-box">
    <h1>Bienvenida {{ usuario }} </h1>
    <p>Motor encendido correctamente</p>

    <a href="/" class="btn">Cerrar sesión</a>
</div>

</body>
</html>
